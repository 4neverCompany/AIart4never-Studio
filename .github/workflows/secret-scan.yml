name: Secret Scan (gitleaks)

# V107-CI: prevent future secret leaks. Runs gitleaks on every push and PR.
# On detection: fails the build + posts the finding as a workflow annotation.
# Catches GitHub PATs, AWS keys, OpenAI keys, generic high-entropy strings.
#
# The HANDOFF.md commit fcb30d3 caught a hardcoded GitHub PAT in
# docs/working-folder/scripts/ that should never have been committed. The
# scripts have been rewritten to read GITHUB_TOKEN from env. This workflow
# is the preventive layer going forward.
#
# Companion to the gitleaks pre-commit hook in .githooks/pre-commit
# (installed by simple-git-hooks on `bun install`).

on:
  push:
    branches: [main, 'release/*', 'feature/*', 'fix/*']
  pull_request:
    branches: [main, 'release/*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan for leaked secrets
    # Dependabot-triggered runs get NO repository/org secrets, so
    # GITLEAKS_LICENSE is empty there and gitleaks-action fails before
    # scanning — every dependabot PR showed a guaranteed-red check
    # (observed on #13–#41, 2026-06-11). Manifest bumps have nothing to
    # secret-scan anyway; human/agent PRs and pushes keep full coverage.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so we catch secrets that were committed and later
          # deleted in the same branch.
          fetch-depth: 0

      - name: Run gitleaks (binary — license-free)
        # RESOLVED-2026-06-14 (Option 3): gitleaks/gitleaks-action@v2 requires a
        # GITLEAKS_LICENSE secret for ORG-owned repos (4neverCompany is an org)
        # and hard-fails BEFORE scanning without it. The gitleaks BINARY has no
        # such gate, so we install + run it directly — full coverage, no license
        # to procure. `git` mode scans the whole history and auto-reads
        # `.gitleaksignore`; gitleaks exits non-zero on any non-allowlisted
        # finding, which (with bash -eo pipefail) fails the job. Public rules
        # catch GitHub PATs (ghp_/gho_/…), AWS keys (AKIA), and generic
        # high-entropy strings — the built-in ruleset, no custom config.
        shell: bash
        env:
          GITLEAKS_VERSION: '8.30.1'
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          chmod +x /tmp/gitleaks
          /tmp/gitleaks version
          /tmp/gitleaks git "$GITHUB_WORKSPACE" --redact --no-banner

      # Post-scan cleanup: if gitleaks found something, log the path
      # to the report artifact. The action uploads `gitleaks.sarif` as
      # a workflow artifact automatically; this step just makes it
      # obvious where to look.
      - name: Annotate results
        if: failure()
        run: |
          echo "::error::gitleaks found a potential secret — see the 'Run gitleaks' step output above for the file:line + rule."
          echo "Local repro: gitleaks git . --redact --no-banner"
          echo "False positive? add its fingerprint (commit:file:rule:line) to .gitleaksignore."
          exit 1
